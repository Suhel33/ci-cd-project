name: Project 4 Bulletproof Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /tmp
            sudo rm -rf temp-repo
            git clone https://github.com/Suhel33/ci-cd-project.git temp-repo
            sudo rm -rf /var/www/html/*
            sudo rm -rf /var/www/html/.* 2>/dev/null || true
            sudo cp -r /tmp/temp-repo/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo find /var/www/html -type d -exec chmod 755 {} +
            sudo find /var/www/html -type f -exec chmod 644 {} +
            sudo systemctl restart nginx

      # Ye naya step aapka URL generate karega
      - name: 🌐 Generate Live URL
        run: |
          echo "### 🎉 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "Aapki website live ho chuki hai. Niche diye gaye link par click karein:" >> $GITHUB_STEP_SUMMARY
          echo "👉 **[http://${{ secrets.REMOTE_HOST }}](http://${{ secrets.REMOTE_HOST }})**" >> $GITHUB_STEP_SUMMARY
