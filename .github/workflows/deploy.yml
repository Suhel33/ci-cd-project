name: Project 4 Final Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Web directory mein jana
            cd /var/www/html
            
            # 2. Permissions sahi karna taaki files delete/write ho sakein
            sudo chown -R ubuntu:ubuntu /var/www/html
            
            # 3. Purani saari files (Portfolio/Default Nginx) saaf karna
            sudo rm -rf *
            sudo rm -rf .git
            
            # 4. Fresh code clone karna seedha html folder mein
            # Note: Last mein ' .' lagana zaroori hai (Space then Dot)
            git clone https://github.com/Suhel33/ci-cd-project.git .
            
            # 5. Nginx restart karna
            sudo systemctl restart nginx
